spring:
  application:
    name: news-feed-app

  datasource:
    url: jdbc:postgresql://localhost:5432/newsfeed
    username: newsfeed
    password: newsfeed
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4jpassword

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.newsfeed: INFO
